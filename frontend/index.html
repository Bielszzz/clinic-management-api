<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Clínica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Sistema Clínica</h1>
            <p>Gerenciamento de Pacientes e Consultas</p>
        </header>

        <div class="sections">
            <!-- PACIENTES -->
            <div class="section">
                <h2>Pacientes</h2>

                <div id="patientMessage" class="message"></div>

                <div class="form-group">
                    <label for="patientName">Nome</label>
                    <input type="text" id="patientName" placeholder="Nome completo">
                </div>

                <div class="form-group">
                    <label for="patientBirthdate">Data de Nascimento</label>
                    <input type="date" id="patientBirthdate">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="savePatient()">Cadastrar</button>
                    <button class="btn-secondary" onclick="cancelPatientEdit()">Cancelar</button>
                </div>

                <div class="list-container">
                    <div id="patientsList"></div>
                </div>
            </div>

            <!-- CONSULTAS -->
            <div class="section">
                <h2>Consultas</h2>

                <div id="appointmentMessage" class="message"></div>

                <div class="form-group">
                    <label for="appointmentPatient">Paciente</label>
                    <select id="appointmentPatient">
                        <option value="">Selecione um paciente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="appointmentDateTime">Data e Hora</label>
                    <input type="datetime-local" id="appointmentDateTime">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="saveAppointment()">Agendar</button>
                    <button class="btn-secondary" onclick="cancelAppointmentEdit()">Cancelar</button>
                </div>

                <div class="list-container">
                    <div id="appointmentsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
